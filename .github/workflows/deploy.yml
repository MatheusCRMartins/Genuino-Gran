name: Deploy para Hostinger

# Roda automaticamente em todo push na branch main, ou manualmente pela aba Actions
on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancela deploys antigos se um novo for disparado
concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build de produção
        run: npm run build

      - name: Copiar .htaccess para o dist
        # O .htaccess fica em /public e o Vite copia para dist/ automaticamente,
        # mas garantimos aqui caso algo mude.
        run: |
          if [ -f public/.htaccess ] && [ ! -f dist/.htaccess ]; then
            cp public/.htaccess dist/.htaccess
          fi

      # Deploy via FTP — Hostinger às vezes dá ETIMEDOUT na 1ª tentativa.
      # Estratégia: até 3 tentativas com 30s de espera entre cada uma.
      # Cada step usa `id` único e `if: failure()` pra rodar só se o anterior falhou.

      - name: Deploy via FTP (tentativa 1/3)
        id: deploy_try1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./
          local-dir: ./dist/
          dangerous-clean-slate: false
          timeout: 60000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.htaccess.bak

      - name: Aguarda 30s antes de tentar de novo
        if: steps.deploy_try1.outcome == 'failure'
        run: sleep 30

      - name: Deploy via FTP (tentativa 2/3)
        id: deploy_try2
        if: steps.deploy_try1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./
          local-dir: ./dist/
          dangerous-clean-slate: false
          timeout: 60000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.htaccess.bak

      - name: Aguarda 45s antes da última tentativa
        if: steps.deploy_try1.outcome == 'failure' && steps.deploy_try2.outcome == 'failure'
        run: sleep 45

      - name: Deploy via FTP (tentativa 3/3 — final)
        if: steps.deploy_try1.outcome == 'failure' && steps.deploy_try2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./
          local-dir: ./dist/
          dangerous-clean-slate: false
          timeout: 90000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.htaccess.bak
